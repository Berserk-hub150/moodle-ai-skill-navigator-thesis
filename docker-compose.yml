services:
  mariadb:
    image: docker.io/bitnamilegacy/mariadb:11.4.6-debian-12-r0
    container_name: tesi-moodle-db
    environment:
      - MARIADB_ROOT_PASSWORD=rootpassword
      - MARIADB_USER=bn_moodle
      - MARIADB_PASSWORD=moodlepassword
      - MARIADB_DATABASE=bitnami_moodle
      - MARIADB_CHARACTER_SET=utf8mb4
      - MARIADB_COLLATE=utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/bitnami/mariadb

  moodle:
    image: docker.io/bitnamilegacy/moodle:4.5.1-debian-12-r0
    container_name: tesi-moodle-app
    ports:
      - "8080:8080"
      - "8443:8443"
    environment:
      - MOODLE_DATABASE_HOST=mariadb
      - MOODLE_DATABASE_PORT_NUMBER=3306
      - MOODLE_DATABASE_USER=bn_moodle
      - MOODLE_DATABASE_PASSWORD=moodlepassword
      - MOODLE_DATABASE_NAME=bitnami_moodle
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=Admin123!
      - MOODLE_EMAIL=admin@example.com
      - MOODLE_SITE_NAME=Tesi Moodle AI
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
    depends_on:
      - mariadb

volumes:
  mariadb_data:
  moodle_data:
  moodledata_data:
